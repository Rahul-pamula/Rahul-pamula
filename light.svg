<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg-light { fill: #ffffff; }
      .text-primary { fill: #0969da; }
      .text-accent { fill: #2684e8; }
      .text-muted { fill: #57606a; }
      .neon-glow { filter: url(#glow-light); }
    </style>
    <filter id="glow-light">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" class="bg-light"/>
  
  <!-- Subtle border -->
  <rect width="400" height="300" fill="none" stroke="#d0d7de" stroke-width="1"/>
  
  <!-- Animated Grid Background -->
  <g opacity="0.08" stroke="#0969da" stroke-width="0.5">
    <line x1="0" y1="50" x2="400" y2="50"/>
    <line x1="0" y1="100" x2="400" y2="100"/>
    <line x1="0" y1="150" x2="400" y2="150"/>
    <line x1="0" y1="200" x2="400" y2="200"/>
    <line x1="0" y1="250" x2="400" y2="250"/>
    <line x1="50" y1="0" x2="50" y2="300"/>
    <line x1="100" y1="0" x2="100" y2="300"/>
    <line x1="150" y1="0" x2="150" y2="300"/>
    <line x1="200" y1="0" x2="200" y2="300"/>
    <line x1="250" y1="0" x2="250" y2="300"/>
    <line x1="300" y1="0" x2="300" y2="300"/>
    <line x1="350" y1="0" x2="350" y2="300"/>
  </g>
  
  <!-- Animated Orbiting Circles -->
  <g class="neon-glow">
    <!-- Center circle -->
    <circle cx="200" cy="150" r="15" class="text-primary"/>
    
    <!-- Orbiting circles -->
    <g id="orbit-1-light">
      <circle cx="200" cy="150" r="50" fill="none" stroke="none"/>
      <circle cx="250" cy="150" r="8" class="text-accent"/>
      <animateMotion dur="6s" repeatCount="indefinite">
        <mpath href="#orbit-1-light"/>
      </animateMotion>
    </g>
    
    <!-- Orbit path for animation -->
    <circle cx="200" cy="150" r="50" fill="none" stroke="none" id="orbit-1-light-path"/>
  </g>
  
  <!-- Pulsing Code Brackets -->
  <g class="neon-glow">
    <text x="80" y="100" font-size="48" font-family="monospace" class="text-primary" font-weight="bold">&lt;</text>
    <text x="270" y="100" font-size="48" font-family="monospace" class="text-accent" font-weight="bold">/&gt;</text>
    
    <animate id="pulse-anim-light" attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite" href="#pulse-anim-light"/>
  </g>
  
  <!-- Animated bars representing code/data -->
  <g class="neon-glow">
    <rect x="150" y="200" width="8" height="30" class="text-primary">
      <animate attributeName="height" values="30;50;30" dur="1.5s" repeatCount="indefinite"/>
      <animate attributeName="y" values="200;180;200" dur="1.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="170" y="200" width="8" height="40" class="text-accent">
      <animate attributeName="height" values="40;60;40" dur="1.5s" repeatCount="indefinite" begin="0.3s"/>
      <animate attributeName="y" values="200;170;200" dur="1.5s" repeatCount="indefinite" begin="0.3s"/>
    </rect>
    <rect x="190" y="200" width="8" height="35" class="text-primary">
      <animate attributeName="height" values="35;55;35" dur="1.5s" repeatCount="indefinite" begin="0.6s"/>
      <animate attributeName="y" values="200;175;200" dur="1.5s" repeatCount="indefinite" begin="0.6s"/>
    </rect>
    <rect x="210" y="200" width="8" height="45" class="text-accent">
      <animate attributeName="height" values="45;65;45" dur="1.5s" repeatCount="indefinite" begin="0.9s"/>
      <animate attributeName="y" values="200;165;200" dur="1.5s" repeatCount="indefinite" begin="0.9s"/>
    </rect>
    <rect x="230" y="200" width="8" height="38" class="text-primary">
      <animate attributeName="height" values="38;58;38" dur="1.5s" repeatCount="indefinite" begin="1.2s"/>
      <animate attributeName="y" values="200;172;200" dur="1.5s" repeatCount="indefinite" begin="1.2s"/>
    </rect>
  </g>
  
  <!-- Rotating gears/cogs (system design element) -->
  <g class="neon-glow" transform="translate(100, 70)">
    <circle cx="0" cy="0" r="18" fill="none" stroke="#0969da" stroke-width="2"/>
    <circle cx="0" cy="-18" r="4" fill="#0969da"/>
    <circle cx="15.6" cy="-9" r="4" fill="#0969da"/>
    <circle cx="15.6" cy="9" r="4" fill="#0969da"/>
    <circle cx="0" cy="18" r="4" fill="#0969da"/>
    <circle cx="-15.6" cy="9" r="4" fill="#0969da"/>
    <circle cx="-15.6" cy="-9" r="4" fill="#0969da"/>
    <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="8s" repeatCount="indefinite" additive="sum"/>
  </g>
  
  <!-- Rotating second gear (opposite direction) -->
  <g class="neon-glow" transform="translate(300, 70)">
    <circle cx="0" cy="0" r="18" fill="none" stroke="#2684e8" stroke-width="2"/>
    <circle cx="0" cy="-18" r="4" fill="#2684e8"/>
    <circle cx="15.6" cy="-9" r="4" fill="#2684e8"/>
    <circle cx="15.6" cy="9" r="4" fill="#2684e8"/>
    <circle cx="0" cy="18" r="4" fill="#2684e8"/>
    <circle cx="-15.6" cy="9" r="4" fill="#2684e8"/>
    <circle cx="-15.6" cy="-9" r="4" fill="#2684e8"/>
    <animateTransform attributeName="transform" type="rotate" from="0" to="-360" dur="8s" repeatCount="indefinite" additive="sum"/>
  </g>
  
  <!-- Blinking dots (network activity) -->
  <g>
    <circle cx="150" cy="260" r="4" class="text-accent">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="1.2s" repeatCount="indefinite"/>
      <animate attributeName="r" values="4;6;4" dur="1.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="200" cy="260" r="4" class="text-primary">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="1.2s" repeatCount="indefinite" begin="0.3s"/>
      <animate attributeName="r" values="4;6;4" dur="1.2s" repeatCount="indefinite" begin="0.3s"/>
    </circle>
    <circle cx="250" cy="260" r="4" class="text-accent">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="1.2s" repeatCount="indefinite" begin="0.6s"/>
      <animate attributeName="r" values="4;6;4" dur="1.2s" repeatCount="indefinite" begin="0.6s"/>
    </circle>
  </g>
</svg>